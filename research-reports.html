<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAPORTY BADAWCZE | KLASYFIKACJA: OMEGA-9</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --text-primary: #c8c8c8;
            --text-secondary: #888888;
            --text-label: #999999;
            --accent: #a0a0a0;
            --danger: #cc3333;
            --bg-body: #0c0c0c;
            --bg-card: #111111;
            --bg-field: #0a0a0a;
            --border: #2a2a2a;
            --border-light: #1e1e1e;
        }

        body {
            font-family: 'IBM Plex Mono', 'Roboto Mono', monospace;
            background: var(--bg-body);
            color: var(--text-primary);
            padding: 20px;
            min-height: 100vh;
            font-size: 13px;
            line-height: 1.6;
        }

        /* Header */
        .site-header {
            max-width: 900px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
        }

        .site-logo {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .site-logo span {
            color: var(--text-secondary);
        }

        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 0;
            border-bottom: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text-primary);
            border-bottom-color: var(--text-secondary);
        }

        /* Page Title */
        .page-header {
            text-align: left;
            max-width: 900px;
            margin: 0 auto 30px auto;
        }

        .page-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 6px;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 0.75rem;
            letter-spacing: 2px;
        }

        /* Status Bar */
        .database-status {
            max-width: 900px;
            margin: 0 auto 30px auto;
            border: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--danger);
        }

        /* Reports Container */
        .reports-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* Report Card */
        .report {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 30px;
            position: relative;
        }

        .report-tag {
            position: absolute;
            top: 12px;
            right: 16px;
            padding: 4px 10px;
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .report-tag.classified {
            color: var(--danger);
            border-color: rgba(204, 51, 51, 0.4);
        }

        .report-header {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            color: var(--text-primary);
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .report-meta {
            background: var(--bg-field);
            border: 1px solid var(--border);
            padding: 14px 18px;
            margin-bottom: 24px;
            font-size: 0.75rem;
            line-height: 2;
            color: var(--text-secondary);
        }

        .report-meta strong {
            color: var(--text-label);
        }

        .section {
            margin-bottom: 24px;
        }

        .section-title {
            color: var(--text-label);
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 6px;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 1px 0;
            font-size: 0.8rem;
            border: 1px solid var(--border-light);
        }

        .data-label {
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background: var(--bg-field);
            border-bottom: 1px solid var(--border-light);
        }

        .data-value {
            color: var(--text-primary);
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-light);
            font-size: 0.8rem;
        }

        .data-value.critical {
            color: var(--danger);
            font-weight: 600;
        }

        .data-value.redacted {
            color: var(--text-secondary);
            text-decoration: line-through;
            opacity: 0.4;
        }

        /* Text blocks */
        .text-block {
            background: var(--bg-field);
            border-left: 2px solid var(--border);
            padding: 12px 16px;
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .text-block p {
            margin-bottom: 10px;
        }

        .text-block p:last-child {
            margin-bottom: 0;
        }

        .text-block .redacted-line {
            background: var(--text-secondary);
            color: var(--text-secondary);
            user-select: none;
            display: inline;
            padding: 0 2px;
        }

        .text-block .timestamp {
            font-size: 0.65rem;
            color: var(--text-secondary);
            opacity: 0.7;
            display: block;
            margin-bottom: 4px;
        }

        /* Warning block */
        .warning-block {
            background: var(--bg-field);
            border: 1px solid rgba(204, 51, 51, 0.3);
            border-left: 3px solid var(--danger);
            padding: 16px 20px;
            margin: 20px 0;
            text-align: left;
        }

        .warning-label {
            font-weight: 700;
            font-size: 0.75rem;
            color: var(--danger);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .warning-desc {
            font-size: 0.75rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        /* Results table */
        .results-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            margin-top: 10px;
        }

        .results-table th {
            background: var(--bg-field);
            color: var(--text-label);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.6rem;
            letter-spacing: 1px;
            padding: 8px 12px;
            text-align: left;
            border: 1px solid var(--border-light);
        }

        .results-table td {
            padding: 8px 12px;
            border: 1px solid var(--border-light);
            color: var(--text-primary);
        }

        .results-table td.danger {
            color: var(--danger);
        }

        .results-table td.muted {
            color: var(--text-secondary);
        }

        /* Report footer */
        .report-footer {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border-light);
            font-size: 0.6rem;
            color: var(--text-secondary);
            text-align: center;
            opacity: 0.6;
        }

        .report-footer .crypto-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 6px;
            font-size: 0.55rem;
            text-transform: uppercase;
        }

        /* Site Footer */
        .site-footer {
            max-width: 900px;
            margin: 40px auto 0 auto;
            padding: 16px;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .footer-text {
            font-size: 0.65rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
            opacity: 0.5;
        }

        /* Collapsible cards */
        .report .card-toggle {
            cursor: pointer;
            user-select: none;
            position: relative;
        }

        .report .card-toggle::after {
            content: '▼';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.6rem;
            color: var(--text-secondary);
            transition: transform 0.2s ease;
        }

        .report.collapsed .card-toggle::after {
            transform: translateY(-50%) rotate(-90deg);
        }

        .report .card-body {
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.2s ease;
            max-height: 5000px;
            opacity: 1;
        }

        .report.collapsed .card-body {
            max-height: 0;
            opacity: 0;
        }

        .report .card-summary {
            display: none;
            font-size: 0.7rem;
            color: var(--text-secondary);
            padding: 8px 0;
            letter-spacing: 1px;
        }

        .report.collapsed .card-summary {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .site-header {
                flex-direction: column;
                gap: 10px;
            }

            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }

            .report {
                padding: 16px;
            }

            .data-grid {
                grid-template-columns: 1fr;
            }

            .data-label {
                border-bottom: none;
                padding-bottom: 2px;
            }

            .page-title {
                font-size: 0.9rem;
            }

            .report-header {
                font-size: 0.75rem;
            }

            .results-table {
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const META_LABELS = {
            nrRaportu: 'NR RAPORTU',
            data: 'DATA',
            autor: 'AUTOR',
            osrodek: 'OSRODEK',
            program: 'PROGRAM',
            kontrakt: 'KONTRAKT',
            zleceniodawca: 'ZLECENIODAWCA',
            finansowanie: 'FINANSOWANIE',
            powiadomiony: 'POWIADOMIONY'
        };

        function redact(str) {
            if (typeof str !== 'string') return str;
            return str.replace(/\{\{REDACTED\}\}/g, '<span class="redacted-line">\u2588\u2588\u2588\u2588\u2588\u2588</span>');
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function safeRedact(str) {
            return redact(escapeHtml(str));
        }

        function renderMeta(meta) {
            let html = '';
            for (const [key, value] of Object.entries(meta)) {
                const label = META_LABELS[key] || key.toUpperCase();
                html += `<strong>${label}:</strong> ${safeRedact(value)}<br>`;
            }
            // Remove trailing <br>
            html = html.replace(/<br>$/, '');
            return html;
        }

        function renderSection(section) {
            let html = `<div class="section">`;
            html += `<div class="section-title">${escapeHtml(section.title)}</div>`;

            switch (section.type) {
                case 'text':
                    html += `<div class="text-block">`;
                    for (const p of section.paragraphs) {
                        html += `<p>${safeRedact(p)}</p>`;
                    }
                    html += `</div>`;
                    break;

                case 'dataGrid':
                    html += `<div class="data-grid">`;
                    for (const field of section.fields) {
                        html += `<div class="data-label">${escapeHtml(field.label)}</div>`;
                        html += `<div class="data-value">${safeRedact(field.value)}</div>`;
                    }
                    html += `</div>`;
                    break;

                case 'table':
                    html += `<table class="results-table">`;
                    html += `<thead><tr>`;
                    for (const h of section.headers) {
                        html += `<th>${escapeHtml(h)}</th>`;
                    }
                    html += `</tr></thead>`;
                    html += `<tbody>`;
                    for (const row of section.rows) {
                        html += `<tr>`;
                        for (const cell of row) {
                            if (typeof cell === 'object' && cell !== null && cell.value !== undefined) {
                                const cls = cell.style ? ` class="${escapeHtml(cell.style)}"` : '';
                                html += `<td${cls}>${safeRedact(cell.value)}</td>`;
                            } else {
                                html += `<td>${safeRedact(String(cell))}</td>`;
                            }
                        }
                        html += `</tr>`;
                    }
                    html += `</tbody></table>`;
                    break;

                case 'timestamped':
                    html += `<div class="text-block">`;
                    for (const entry of section.entries) {
                        if (entry.timestamp) {
                            html += `<span class="timestamp">${escapeHtml(entry.timestamp)}</span>`;
                        }
                        html += `<p>${safeRedact(entry.text)}</p>`;
                    }
                    html += `</div>`;
                    break;
            }

            html += `</div>`;
            return html;
        }

        function renderReport(report) {
            // Build a short summary from meta date + report number
            const summary = (report.meta.data || '') + ' // ' + (report.meta.nrRaportu || '');

            let html = `<div class="report collapsed">`;
            html += `<div class="report-tag classified">${escapeHtml(report.tag)}</div>`;
            html += `<div class="report-header card-toggle">${safeRedact(report.header)}</div>`;
            html += `<div class="card-summary">${escapeHtml(summary)}</div>`;

            html += `<div class="card-body">`;
            html += `<div class="report-meta">${renderMeta(report.meta)}</div>`;

            if (report.warning) {
                html += `<div class="warning-block">`;
                html += `<div class="warning-label">${escapeHtml(report.warning.label)}</div>`;
                html += `<div class="warning-desc">${safeRedact(report.warning.text)}</div>`;
                html += `</div>`;
            }

            for (const section of report.sections) {
                html += renderSection(section);
            }

            html += `</div>`; // .card-body

            html += `<div class="report-footer">`;
            html += escapeHtml(report.footer.text);
            html += `<div class="crypto-bar">`;
            for (const c of report.footer.crypto) {
                html += `<span>${escapeHtml(c)}</span>`;
            }
            html += `</div></div>`;

            html += `</div>`;
            return html;
        }

        function renderPage(data) {
            let html = '';

            // Site header
            html += `<header class="site-header">`;
            html += `<a href="index.html" class="site-logo">ANDROID<span>DATA</span></a>`;
            html += `<nav><ul class="nav-links">`;
            html += `<li><a href="index.html">Strona Glowna</a></li>`;
            html += `<li><a href="medical-records.html">Dokumentacja Laboratoryjna</a></li>`;
            html += `<li><a href="research-reports.html" class="active">Raporty Badawcze</a></li>`;
            html += `</ul></nav>`;
            html += `</header>`;

            // Page header
            html += `<div class="page-header">`;
            html += `<div class="page-title">${escapeHtml(data.page.pageTitle)}</div>`;
            html += `<div class="page-subtitle">${escapeHtml(data.page.pageSubtitle)}</div>`;
            html += `</div>`;

            // Database status bar
            html += `<div class="database-status">`;
            html += `<div class="status-item"><span class="status-dot"></span>${escapeHtml(data.page.status.label)}</div>`;
            html += `<div class="status-item">${escapeHtml(data.page.status.records)}</div>`;
            html += `<div class="status-item">${escapeHtml(data.page.status.source)}</div>`;
            html += `</div>`;

            // Reports
            html += `<div class="reports-container">`;
            for (const report of data.reports) {
                html += renderReport(report);
            }
            html += `</div>`;

            // Site footer
            html += `<footer class="site-footer">`;
            html += `<div class="footer-text">${escapeHtml(data.footer.line1)}</div>`;
            html += `<div class="footer-text">${escapeHtml(data.footer.line2)}</div>`;
            html += `</footer>`;

            document.getElementById('app').innerHTML = html;

            // Toggle cards on header click
            document.querySelectorAll('.report .card-toggle').forEach(function(el) {
                el.addEventListener('click', function() {
                    this.closest('.report').classList.toggle('collapsed');
                });
            });
        }

        fetch('data/research-reports.json')
            .then(response => response.json())
            .then(data => renderPage(data))
            .catch(err => console.error('Failed to load research reports:', err));
    </script>
</body>
</html>
