<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOKUMENTACJA LABORATORYJNA | KLASYFIKACJA: OMEGA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --text-primary: #c8c8c8;
            --text-secondary: #888888;
            --text-label: #999999;
            --accent: #a0a0a0;
            --danger: #cc3333;
            --bg-body: #0c0c0c;
            --bg-card: #111111;
            --bg-field: #0a0a0a;
            --border: #2a2a2a;
            --border-light: #1e1e1e;
        }

        body {
            font-family: 'IBM Plex Mono', 'Roboto Mono', monospace;
            background: var(--bg-body);
            color: var(--text-primary);
            padding: 20px;
            min-height: 100vh;
            font-size: 13px;
            line-height: 1.6;
        }

        /* Header Navigation */
        .site-header {
            max-width: 900px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
        }

        .site-logo {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .site-logo span {
            color: var(--text-secondary);
        }

        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 0;
            border-bottom: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text-primary);
            border-bottom-color: var(--text-secondary);
        }

        /* Page Title */
        .page-header {
            text-align: left;
            max-width: 900px;
            margin: 0 auto 30px auto;
        }

        .page-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 6px;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 0.75rem;
            letter-spacing: 2px;
        }

        /* Database Status Bar */
        .database-status {
            max-width: 900px;
            margin: 0 auto 30px auto;
            border: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #559955;
        }

        /* Records Grid */
        .records-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* Medical Datapad Card */
        .datapad {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 30px;
            position: relative;
        }

        .datapad.infected {
            border-color: var(--border);
            border-left: 3px solid var(--danger);
        }

        .datapad::before {
            display: none;
        }

        .scan-beam {
            display: none;
        }

        .status-bar {
            position: absolute;
            top: 12px;
            right: 16px;
            padding: 4px 10px;
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            z-index: 3;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-bar.warning {
            color: var(--text-secondary);
            border-color: var(--border);
            background: transparent;
        }

        .status-bar.critical {
            color: var(--danger);
            border-color: rgba(204, 51, 51, 0.4);
            background: transparent;
            animation: none;
        }

        .header {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            color: var(--text-primary);
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .datapad.infected .header {
            color: var(--text-primary);
        }

        .classification {
            background: var(--bg-field);
            border: 1px solid var(--border);
            padding: 14px 18px;
            margin-bottom: 24px;
            font-size: 0.75rem;
            line-height: 2;
            color: var(--text-secondary);
        }

        .classification strong {
            color: var(--text-label);
        }

        .section {
            margin-bottom: 24px;
        }

        .section-title {
            color: var(--text-label);
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 6px;
        }

        .datapad.infected .section-title {
            color: var(--text-label);
            border-bottom-color: var(--border-light);
        }

        .data-grid {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 1px 0;
            font-size: 0.8rem;
            border: 1px solid var(--border-light);
        }

        .data-label {
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background: var(--bg-field);
            border-bottom: 1px solid var(--border-light);
        }

        .data-value {
            color: var(--text-primary);
            background: transparent;
            padding: 8px 12px;
            border: none;
            border-bottom: 1px solid var(--border-light);
            border-radius: 0;
            font-size: 0.8rem;
        }

        .data-value.highlight {
            color: var(--text-primary);
            border-color: var(--border-light);
        }

        .data-value.warning {
            color: var(--text-primary);
            border-color: var(--border-light);
        }

        .data-value.critical {
            color: var(--danger);
            border-color: var(--border-light);
            font-weight: 600;
        }

        .data-value.success {
            color: var(--text-primary);
            border-color: var(--border-light);
        }

        /* Warning Box */
        .warning-box {
            background: var(--bg-field);
            border: 1px solid rgba(204, 51, 51, 0.3);
            border-left: 3px solid var(--danger);
            padding: 16px 20px;
            margin: 20px 0;
            text-align: left;
            animation: none;
        }

        .warning-box.orange {
            background: var(--bg-field);
            border-color: var(--border);
            border-left: 3px solid var(--text-secondary);
        }

        .warning-box.yellow {
            background: var(--bg-field);
            border-color: var(--border);
            border-left: 3px solid var(--text-secondary);
        }

        .warning-text {
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--danger);
            -webkit-text-fill-color: var(--danger);
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .warning-box.orange .warning-text {
            color: var(--text-secondary);
            -webkit-text-fill-color: var(--text-secondary);
            background: none;
            -webkit-background-clip: unset;
        }

        .warning-box.yellow .warning-text {
            color: var(--text-secondary);
            -webkit-text-fill-color: var(--text-secondary);
            background: none;
            -webkit-background-clip: unset;
        }

        .warning-detail {
            margin-top: 8px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .warning-box.orange .warning-detail {
            color: var(--text-secondary);
        }

        .warning-box.yellow .warning-detail {
            color: var(--text-secondary);
        }

        /* Vitals Section */
        .vitals-container {
            margin-top: 15px;
        }

        .vital-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            gap: 12px;
        }

        .vital-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            width: 150px;
            flex-shrink: 0;
        }

        .vital-bar {
            flex: 1;
            height: 4px;
            background: var(--border-light);
            overflow: hidden;
        }

        .vital-fill {
            height: 100%;
        }

        .vital-fill.excellent,
        .vital-fill.good {
            background: #559955;
        }

        .vital-fill.moderate {
            background: var(--text-secondary);
        }

        .vital-fill.poor,
        .vital-fill.critical {
            background: var(--danger);
        }

        .vital-value {
            font-size: 0.7rem;
            color: var(--text-secondary);
            width: 50px;
            text-align: right;
        }

        /* Cybernetics List */
        .cyber-list {
            list-style: none;
            margin-top: 10px;
        }

        .cyber-item {
            padding: 8px 12px;
            background: var(--bg-field);
            border: 1px solid var(--border-light);
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }

        .cyber-name {
            color: var(--text-primary);
        }

        .cyber-status {
            font-size: 0.6rem;
            padding: 2px 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cyber-status.functional {
            background: transparent;
            color: #559955;
            border: 1px solid #334433;
        }

        .cyber-status.degraded {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .cyber-status.offline {
            background: transparent;
            color: var(--danger);
            border: 1px solid rgba(204, 51, 51, 0.3);
        }

        /* Notes Box */
        .notes-box {
            background: var(--bg-field);
            border-left: 2px solid var(--border) !important;
            padding: 12px 16px;
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .notes-box .note-entry {
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-light);
        }

        .notes-box .note-entry:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .notes-box .note-date {
            font-size: 0.65rem;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 4px;
            opacity: 0.7;
        }

        /* Footer */
        .datapad-footer {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border-light);
            font-size: 0.6rem;
            color: var(--text-secondary);
            text-align: center;
            opacity: 0.6;
        }

        .crypto-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 6px;
            font-size: 0.55rem;
            text-transform: uppercase;
        }

        /* Site Footer */
        .site-footer {
            max-width: 900px;
            margin: 40px auto 0 auto;
            padding: 16px;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .footer-text {
            font-size: 0.65rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
            opacity: 0.5;
        }

        .footer-text span {
            color: var(--text-secondary);
        }

        /* Results Table */
        .results-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            margin-top: 10px;
        }

        .results-table th {
            background: var(--bg-field);
            color: var(--text-label);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.6rem;
            letter-spacing: 1px;
            padding: 8px 12px;
            text-align: left;
            border: 1px solid var(--border-light);
        }

        .results-table td {
            padding: 8px 12px;
            border: 1px solid var(--border-light);
            color: var(--text-primary);
        }

        .results-table td.danger {
            color: var(--danger);
        }

        .results-table td.muted {
            color: var(--text-secondary);
        }

        /* Anomaly marker */
        .anomaly-flag {
            background: var(--bg-field);
            border: 1px solid rgba(204, 51, 51, 0.3);
            border-left: 3px solid var(--danger);
            padding: 12px 16px;
            margin-top: 12px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .anomaly-flag .flag-label {
            font-weight: 700;
            font-size: 0.65rem;
            color: var(--danger);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        /* Note marker */
        .note-marker {
            background: var(--bg-field);
            border-left: 2px solid var(--border);
            padding: 10px 14px;
            margin-top: 10px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        /* Locked Panel */
        .locked-panel {
            max-width: 900px;
            margin: 40px auto 0 auto;
            padding: 24px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            text-align: center;
        }

        .locked-icon {
            font-size: 1.4rem;
            color: var(--danger);
            margin-bottom: 10px;
        }

        .locked-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .locked-desc {
            font-size: 0.65rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .locked-btn {
            display: inline-block;
            padding: 10px 28px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            background: var(--bg-field);
            cursor: not-allowed;
            opacity: 0.5;
            user-select: none;
        }

        .locked-btn.disabled:hover {
            opacity: 0.5;
        }

        .locked-meta {
            margin-top: 12px;
            font-size: 0.55rem;
            color: var(--text-secondary);
            opacity: 0.4;
            letter-spacing: 1px;
        }

        /* Collapsible cards */
        .datapad .card-toggle {
            cursor: pointer;
            user-select: none;
            position: relative;
            z-index: 3;
        }

        .datapad .card-toggle::after {
            content: '▼';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.6rem;
            color: var(--text-secondary);
            transition: transform 0.2s ease;
        }

        .datapad.collapsed .card-toggle::after {
            transform: translateY(-50%) rotate(-90deg);
        }

        .datapad .card-body {
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.2s ease;
            max-height: 5000px;
            opacity: 1;
        }

        .datapad.collapsed .card-body {
            max-height: 0;
            opacity: 0;
        }

        .datapad .card-summary {
            display: none;
            font-size: 0.7rem;
            color: var(--text-secondary);
            padding: 8px 0;
            letter-spacing: 1px;
        }

        .datapad.collapsed .card-summary {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .site-header {
                flex-direction: column;
                gap: 10px;
            }

            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }

            .datapad {
                padding: 16px;
            }

            .status-bar {
                position: static;
                display: inline-block;
                margin-bottom: 12px;
            }

            .header {
                font-size: 0.7rem;
                letter-spacing: 1px;
                padding-right: 20px;
            }

            .card-summary {
                font-size: 0.6rem;
            }

            .data-grid {
                grid-template-columns: 1fr;
            }

            .data-label {
                border-bottom: none;
                padding-bottom: 2px;
            }

            .page-title {
                font-size: 0.9rem;
            }

            .page-subtitle {
                font-size: 0.6rem;
                letter-spacing: 1px;
            }

            .database-status {
                flex-direction: column;
                gap: 6px;
            }

            .results-table {
                font-size: 0.6rem;
            }

            .results-table th,
            .results-table td {
                padding: 4px 6px;
            }

            .vital-row {
                flex-wrap: wrap;
            }

            .vital-label {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Site Header -->
    <header class="site-header">
        <a href="index.html" class="site-logo">ANDROID<span>DATA</span></a>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Strona Glowna</a></li>
                <li><a href="medical-records.html" class="active">Dokumentacja Laboratoryjna</a></li>
            </ul>
        </nav>
    </header>

    <div class="page-header">
        <h1 class="page-title" id="page-title"></h1>
        <p class="page-subtitle" id="page-subtitle"></p>
    </div>

    <div class="database-status" id="database-status"></div>

    <div class="records-container" id="records-container"></div>

    <div id="locked-panel-container"></div>

    <footer class="site-footer" id="site-footer"></footer>

    <script>
    (async function() {
        const res = await fetch('data/medical-records.json');
        const data = await res.json();

        // Helper: get cell value and optional style class
        function cellValue(cell) {
            if (cell && typeof cell === 'object' && cell.value !== undefined) {
                return { value: cell.value, style: cell.style || '' };
            }
            return { value: cell, style: '' };
        }

        // Helper: escape HTML
        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        // Page header
        document.title = data.page.title;
        document.getElementById('page-title').textContent = data.page.pageTitle;
        document.getElementById('page-subtitle').textContent = data.page.pageSubtitle;

        // Database status
        const status = data.page.status;
        document.getElementById('database-status').innerHTML =
            '<div class="status-item"><span class="status-dot"></span><span>' + esc(status.label) + '</span></div>' +
            '<div class="status-item"><span>' + esc(status.records) + '</span></div>' +
            '<div class="status-item"><span>' + esc(status.lastSync) + '</span></div>' +
            '<div class="status-item"><span>' + esc(status.access) + '</span></div>';

        // Render subjects
        const container = document.getElementById('records-container');
        data.subjects.forEach(function(subject) {
            let html = '';
            html += '<div class="datapad infected collapsed">';
            html += '<div class="scan-beam"></div>';
            html += '<div class="status-bar critical">' + esc(subject.statusBar) + '</div>';
            html += '<h2 class="header card-toggle">' + esc(subject.header) + '</h2>';
            html += '<div class="card-summary">' + esc(subject.warning.details[subject.warning.details.length - 1]) + '</div>';

            html += '<div class="card-body">';

            // Classification
            const cl = subject.classification;
            html += '<div class="classification">';
            html += '<strong>KLASYFIKACJA:</strong> ' + esc(cl.klasyfikacja) + '<br>';
            html += '<strong>TYP DOKUMENTU:</strong> ' + esc(cl.typDokumentu) + '<br>';
            html += '<strong>ZNACZNIK CZASOWY:</strong> ' + esc(cl.znacznikCzasowy) + '<br>';
            html += '<strong>PLACOWKA:</strong> ' + esc(cl.placowka);
            html += '</div>';

            // Warning box
            const w = subject.warning;
            html += '<div class="warning-box">';
            html += '<div class="warning-text">' + esc(w.text) + '</div>';
            w.details.forEach(function(d) {
                html += '<div class="warning-detail">' + esc(d) + '</div>';
            });
            html += '</div>';

            // Sections
            subject.sections.forEach(function(section, idx) {
                html += '<div class="section">';
                html += '<div class="section-title">' + (idx + 1) + '. ' + esc(section.title) + '</div>';

                if (section.type === 'dataGrid') {
                    html += renderDataGrid(section.data);
                } else if (section.type === 'table') {
                    html += renderTable(section.headers, section.rows);
                } else if (section.type === 'notes') {
                    html += '<div class="notes-box">';
                    section.entries.forEach(function(entry) {
                        html += '<div class="note-entry">' + esc(entry) + '</div>';
                    });
                    html += '</div>';
                } else if (section.type === 'observations') {
                    html += '<div class="notes-box">';
                    section.entries.forEach(function(entry) {
                        html += '<div class="note-entry">';
                        html += '<span class="note-date">' + esc(entry.date) + ' ' + esc(entry.researcher) + '</span>';
                        html += esc(entry.text);
                        html += '</div>';
                    });
                    html += '</div>';
                } else if (section.type === 'augmentations') {
                    html += '<ul class="cyber-list">';
                    section.items.forEach(function(item) {
                        html += '<li class="cyber-item">';
                        html += '<span class="cyber-name">' + esc(item.name) + '</span>';
                        html += '<span class="cyber-status ' + esc(item.statusClass) + '">' + esc(item.status) + '</span>';
                        html += '</li>';
                    });
                    html += '</ul>';
                    if (section.details && section.details.type === 'dataGrid') {
                        html += '<div class="data-grid" style="margin-top: 12px;">';
                        html += renderDataGridInner(section.details.data);
                        html += '</div>';
                    }
                } else if (section.type === 'equipment') {
                    html += '<ul class="cyber-list">';
                    section.items.forEach(function(item) {
                        html += '<li class="cyber-item">';
                        html += '<span class="cyber-name">' + esc(item.name) + '</span>';
                        html += '<span class="cyber-status ' + esc(item.statusClass) + '">' + esc(item.status) + '</span>';
                        html += '</li>';
                    });
                    html += '</ul>';
                }

                // Anomaly flag (can appear on tables, augmentations, notes, etc.)
                if (section.anomaly) {
                    html += '<div class="anomaly-flag">';
                    html += '<div class="flag-label">' + esc(section.anomaly.label) + '</div>';
                    html += esc(section.anomaly.text);
                    html += '</div>';
                }

                // Note marker
                if (section.noteMarker) {
                    html += '<div class="note-marker">' + esc(section.noteMarker) + '</div>';
                }

                html += '</div>'; // .section
            });

            html += '</div>'; // .card-body

            // Footer (always visible)
            const f = subject.footer;
            html += '<div class="datapad-footer">';
            html += '<div>' + esc(f.text) + '</div>';
            html += '<div class="crypto-bar">';
            f.crypto.forEach(function(c) {
                html += '<span>[' + esc(c) + ']</span>';
            });
            html += '</div>';
            html += '</div>';

            html += '</div>'; // .datapad
            container.innerHTML += html;
        });

        // Toggle cards on header click
        document.querySelectorAll('.datapad .card-toggle').forEach(function(el) {
            el.addEventListener('click', function() {
                this.closest('.datapad').classList.toggle('collapsed');
            });
        });

        // Locked panel
        const lp = data.lockedPanel;
        document.getElementById('locked-panel-container').innerHTML =
            '<div class="locked-panel">' +
            '<div class="locked-icon">' + esc(lp.icon) + '</div>' +
            '<div class="locked-title">' + esc(lp.title) + '</div>' +
            '<div class="locked-desc">' + esc(lp.description) + '</div>' +
            '<a class="locked-btn disabled" href="' + esc(lp.buttonHref) + '" onclick="return false;">' + esc(lp.buttonText) + '</a>' +
            '<div class="locked-meta">' + esc(lp.meta) + '</div>' +
            '</div>';

        // Site footer
        const ft = data.footer;
        document.getElementById('site-footer').innerHTML =
            '<p class="footer-text">' + esc(ft.line1) + '</p>' +
            '<p class="footer-text" style="margin-top: 10px;">' + esc(ft.line2) + '</p>';

        // --- Helper render functions ---

        function renderDataGrid(dataObj) {
            let h = '<div class="data-grid">';
            h += renderDataGridInner(dataObj);
            h += '</div>';
            return h;
        }

        function renderDataGridInner(dataObj) {
            let h = '';
            for (const key in dataObj) {
                const cv = cellValue(dataObj[key]);
                const cls = cv.style ? ' ' + cv.style : '';
                h += '<div class="data-label">' + esc(key) + ':</div>';
                h += '<div class="data-value' + cls + '">' + esc(cv.value) + '</div>';
            }
            return h;
        }

        function renderTable(headers, rows) {
            let h = '<table class="results-table"><tr>';
            headers.forEach(function(th) {
                h += '<th>' + esc(th) + '</th>';
            });
            h += '</tr>';
            rows.forEach(function(row) {
                h += '<tr>';
                row.forEach(function(cell) {
                    const cv = cellValue(cell);
                    const cls = cv.style ? ' class="' + esc(cv.style) + '"' : '';
                    h += '<td' + cls + '>' + esc(cv.value) + '</td>';
                });
                h += '</tr>';
            });
            h += '</table>';
            return h;
        }
    })();
    </script>
</body>
</html>
